<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Photo restoration gallery by Harbour Hues Media, Halifax NS. Colour correction, scratch removal, and full restorations.">
    <title>Photo Restoration Gallery - Harbour Hues Media</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1a4567; --secondary: #f4a261; --accent: #e76f51; --bg: #f8f9fa; --text: #2c3e50; --white: #ffffff; --shadow: 0 10px 30px rgba(0,0,0,0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }

        .gallery-header { position: sticky; top: 0; background: rgba(255,255,255,0.97); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(26,69,103,0.08); padding: 0 2rem; height: 70px; display: flex; align-items: center; justify-content: space-between; z-index: 100; }
        .nav-brand { font-family: 'Playfair Display', serif; font-size: 1.2rem; color: var(--primary); text-decoration: none; letter-spacing: 0.04em; }
        .nav-brand span { color: var(--secondary); font-style: italic; }
        .back-link { color: var(--primary); text-decoration: none; font-size: 0.82rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; transition: color 0.2s; }
        .back-link:hover { color: var(--secondary); }

        .gallery-main { padding: 3rem 2rem 2rem; text-align: center; }
        .gallery-main h1 { font-size: 2.6rem; color: var(--primary); border-bottom: 2px solid var(--secondary); display: inline-block; padding-bottom: 0.5rem; margin-bottom: 0.6rem; }
        .gallery-main > p { color: #6b7c8d; margin-bottom: 2rem; font-size: 1rem; font-style: italic; }

        .ba-pairs-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 1.5rem; max-width: 1400px; margin: 0 auto; }
        .ba-card { background: var(--white); border-radius: 12px; overflow: hidden; box-shadow: var(--shadow); transition: transform 0.3s, box-shadow 0.3s; }
        .ba-card:hover { transform: translateY(-4px); box-shadow: 0 20px 50px rgba(0,0,0,0.15); }
        .ba-labels { display: grid; grid-template-columns: 1fr 1fr; border-bottom: 1px solid rgba(26,69,103,0.1); }
        .ba-label { padding: 0.4rem; text-align: center; font-size: 0.7rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: #6b7c8d; }
        .ba-label:first-child { border-right: 1px solid rgba(26,69,103,0.1); }
        .ba-images-row { display: grid; grid-template-columns: 1fr 1fr; }
        .ba-col { overflow: hidden; }
        .ba-col:first-child { border-right: 1px solid rgba(26,69,103,0.08); }
        .ba-col img { width: 100%; height: 220px; object-fit: cover; object-position: 50% 15%; display: block; cursor: zoom-in; transition: transform 0.3s; }
        .ba-col:hover img { transform: scale(1.03); }

        .back-btn-wrap { text-align: center; padding: 3rem 2rem 2rem; }
        .btn-home { display: inline-block; padding: 0.9rem 2.5rem; background: var(--primary); color: white; text-decoration: none; border-radius: 50px; font-weight: 600; font-size: 0.9rem; letter-spacing: 0.05em; transition: background 0.3s, transform 0.2s; }
        .btn-home:hover { background: var(--accent); transform: translateY(-2px); }

        footer { background: var(--primary); color: white; padding: 2rem; text-align: center; font-size: 0.9rem; }
        footer a { color: var(--secondary); }

        .lightbox-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.93); z-index: 9999; align-items: center; justify-content: center; }
        .lightbox-overlay.active { display: flex; }
        .lightbox-img { max-width: 85vw; max-height: 85vh; border-radius: 4px; display: block; }
        .lightbox-close { position: absolute; top: 1.5rem; right: 2rem; font-size: 2.5rem; color: white; cursor: pointer; background: none; border: none; font-family: sans-serif; line-height: 1; transition: color 0.2s; }
        .lightbox-close:hover { color: var(--secondary); }
        .lightbox-prev, .lightbox-next { position: absolute; top: 50%; transform: translateY(-50%); font-size: 3.5rem; color: white; cursor: pointer; background: none; border: none; font-family: sans-serif; padding: 0 1.2rem; transition: color 0.2s; line-height: 1; }
        .lightbox-prev { left: 0.5rem; } .lightbox-next { right: 0.5rem; }
        .lightbox-prev:hover, .lightbox-next:hover { color: var(--secondary); }
        .lb-counter { position: absolute; bottom: 1.5rem; left: 50%; transform: translateX(-50%); color: white; font-size: 0.85rem; background: rgba(0,0,0,0.5); padding: 0.3rem 0.9rem; border-radius: 20px; }

        @media (max-width: 600px) { .ba-pairs-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <header class="gallery-header">
        <a href="index.html" class="nav-brand">Harbour <span>Hues</span> Media</a>
        <a href="index.html" class="back-link">&larr; Home</a>
    </header>

    <main class="gallery-main">
        <h1>Photo Restoration</h1>
        <p>Bringing old and damaged photographs back to life. Click any image to view full size.</p>

        <div class="ba-pairs-grid">
            <div class="ba-card">
                <div class="ba-labels"><span class="ba-label">Before</span><span class="ba-label">After</span></div>
                <div class="ba-images-row">
                    <div class="ba-col"><img src="img/restoration/photo%201%20before%20Large.jpeg" alt="Before restoration" data-index="0"></div>
                    <div class="ba-col"><img src="img/restoration/photo%201%20after%20Large.jpeg" alt="After restoration" data-index="1"></div>
                </div>
            </div>
            <div class="ba-card">
                <div class="ba-labels"><span class="ba-label">Before</span><span class="ba-label">After</span></div>
                <div class="ba-images-row">
                    <div class="ba-col"><img src="img/restoration/photo%202%20before%20Large.jpeg" alt="Before restoration" data-index="2"></div>
                    <div class="ba-col"><img src="img/restoration/photo%202%20after%20Large.jpeg" alt="After restoration" data-index="3"></div>
                </div>
            </div>
            <div class="ba-card">
                <div class="ba-labels"><span class="ba-label">Before</span><span class="ba-label">After</span></div>
                <div class="ba-images-row">
                    <div class="ba-col"><img src="img/restoration/photo%203%20before%20Large.jpeg" alt="Before restoration" data-index="4"></div>
                    <div class="ba-col"><img src="img/restoration/photo%203%20after%20Large.jpeg" alt="After restoration" data-index="5"></div>
                </div>
            </div>
            <div class="ba-card">
                <div class="ba-labels"><span class="ba-label">Before</span><span class="ba-label">After</span></div>
                <div class="ba-images-row">
                    <div class="ba-col"><img src="img/restoration/photo%204%20before%20Large.jpeg" alt="Before restoration" data-index="6"></div>
                    <div class="ba-col"><img src="img/restoration/photo%204%20after%20Large.jpeg" alt="After restoration" data-index="7"></div>
                </div>
            </div>
            <div class="ba-card">
                <div class="ba-labels"><span class="ba-label">Before</span><span class="ba-label">After</span></div>
                <div class="ba-images-row">
                    <div class="ba-col"><img src="img/restoration/photo%205%20before%20Large.jpeg" alt="Before restoration" data-index="8"></div>
                    <div class="ba-col"><img src="img/restoration/photo%205%20after%20Large.jpeg" alt="After restoration" data-index="9"></div>
                </div>
            </div>
            <div class="ba-card">
                <div class="ba-labels"><span class="ba-label">Before</span><span class="ba-label">After</span></div>
                <div class="ba-images-row">
                    <div class="ba-col"><img src="img/restoration/photo%206%20before%20Large.jpeg" alt="Before restoration" data-index="10"></div>
                    <div class="ba-col"><img src="img/restoration/photo%206%20after%20Large.jpeg" alt="After restoration" data-index="11"></div>
                </div>
            </div>
            <div class="ba-card">
                <div class="ba-labels"><span class="ba-label">Before</span><span class="ba-label">After</span></div>
                <div class="ba-images-row">
                    <div class="ba-col"><img src="img/restoration/photo%207%20before%20Large.jpeg" alt="Before restoration" data-index="12"></div>
                    <div class="ba-col"><img src="img/restoration/photo%207%20after%20Large.jpeg" alt="After restoration" data-index="13"></div>
                </div>
            </div>
        </div>
    </main>

    <div class="back-btn-wrap"><a href="index.html" class="btn-home">&larr; Back to Home</a></div>

    <footer><p>&copy; 2026 Harbour Hues Media. Halifax, NS. <a href="mailto:hello@harbourhuesmedia.ca">hello@harbourhuesmedia.ca</a></p></footer>

    <div id="lightbox" class="lightbox-overlay">
        <button class="lightbox-close">&times;</button>
        <button class="lightbox-prev">&#8249;</button>
        <img id="lightbox-img" class="lightbox-img" src="" alt="" loading="lazy">
        <button class="lightbox-next">&#8250;</button>
        <div id="lb-counter" class="lb-counter"></div>
    </div>

    <script>
        // All 14 images: before1, after1, before2, after2 ... before7, after7
        const images = [
            'img/restoration/photo%201%20before%20Large.jpeg','img/restoration/photo%201%20after%20Large.jpeg',
            'img/restoration/photo%202%20before%20Large.jpeg','img/restoration/photo%202%20after%20Large.jpeg',
            'img/restoration/photo%203%20before%20Large.jpeg','img/restoration/photo%203%20after%20Large.jpeg',
            'img/restoration/photo%204%20before%20Large.jpeg','img/restoration/photo%204%20after%20Large.jpeg',
            'img/restoration/photo%205%20before%20Large.jpeg','img/restoration/photo%205%20after%20Large.jpeg',
            'img/restoration/photo%206%20before%20Large.jpeg','img/restoration/photo%206%20after%20Large.jpeg',
            'img/restoration/photo%207%20before%20Large.jpeg','img/restoration/photo%207%20after%20Large.jpeg',
        ];
        let currentIndex = 0;
        const lb = document.getElementById('lightbox'), lbImg = document.getElementById('lightbox-img'), lbCounter = document.getElementById('lb-counter');
        function updateLightbox() { lbImg.src = images[currentIndex]; lbCounter.textContent = `${currentIndex + 1} / ${images.length}`; }
        function openGalleryLightbox(i) { currentIndex = i; updateLightbox(); lb.classList.add('active'); document.body.style.overflow = 'hidden'; }
        function closeLightbox() { lb.classList.remove('active'); lbImg.src = ''; document.body.style.overflow = ''; }
        function prevImage(e) { if (e) e.stopPropagation(); currentIndex = (currentIndex - 1 + images.length) % images.length; updateLightbox(); }
        function nextImage(e) { if (e) e.stopPropagation(); currentIndex = (currentIndex + 1) % images.length; updateLightbox(); }
        document.querySelectorAll('.ba-col img').forEach(img => img.addEventListener('click', () => openGalleryLightbox(+img.dataset.index)));
        lb.addEventListener('click', e => { if (e.target === lb) closeLightbox(); });
        document.querySelector('.lightbox-close').addEventListener('click', closeLightbox);
        document.querySelector('.lightbox-prev').addEventListener('click', prevImage);
        document.querySelector('.lightbox-next').addEventListener('click', nextImage);
        document.addEventListener('keydown', e => { if (!lb.classList.contains('active')) return; if (e.key === 'Escape') closeLightbox(); if (e.key === 'ArrowLeft') prevImage(); if (e.key === 'ArrowRight') nextImage(); });
    </script>
</body>
</html>
