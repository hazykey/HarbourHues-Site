    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1a4567; --secondary: #f4a261; --accent: #e76f51; --bg: #f8f9fa; --text: #2c3e50; --white: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }

        .gallery-header { position: sticky; top: 0; background: rgba(255,255,255,0.97); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(26,69,103,0.08); padding: 0 2rem; height: 70px; display: flex; align-items: center; justify-content: space-between; z-index: 100; }
        .nav-brand { font-family: 'Playfair Display', serif; font-size: 1.2rem; color: var(--primary); text-decoration: none; letter-spacing: 0.04em; }
        .nav-brand span { color: var(--secondary); font-style: italic; }
        .back-link { color: var(--primary); text-decoration: none; font-size: 0.82rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; transition: color 0.2s; }
        .back-link:hover { color: var(--secondary); }

        .gallery-main { padding: 3rem 2rem 2rem; text-align: center; }
        .gallery-main h1 { font-size: 2.6rem; color: var(--primary); border-bottom: 2px solid var(--secondary); display: inline-block; padding-bottom: 0.5rem; margin-bottom: 0.6rem; }
        .gallery-main > p { color: #6b7c8d; margin-bottom: 2rem; font-size: 1rem; font-style: italic; }

        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 0.75rem; max-width: 1400px; margin: 0 auto; }
        /* Face-focused crop: show top of image where faces are */
        .gallery-thumb { overflow: hidden; border-radius: 8px; aspect-ratio: 1; background: #e8edf2; cursor: zoom-in; }
        .gallery-thumb img { width: 100%; height: 100%; object-fit: cover; object-position: 50% 15%; display: block; transition: transform 0.3s; }
        .gallery-thumb:hover img { transform: scale(1.05); }

        .back-btn-wrap { text-align: center; padding: 3rem 2rem 2rem; }
        .btn-home { display: inline-block; padding: 0.9rem 2.5rem; background: var(--primary); color: white; text-decoration: none; border-radius: 50px; font-weight: 600; font-size: 0.9rem; letter-spacing: 0.05em; transition: background 0.3s, transform 0.2s; }
        .btn-home:hover { background: var(--accent); transform: translateY(-2px); }

        footer { background: var(--primary); color: white; padding: 2rem; text-align: center; font-size: 0.9rem; }
        footer a { color: var(--secondary); }

        .lightbox-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.93); z-index: 9999; align-items: center; justify-content: center; }
        .lightbox-overlay.active { display: flex; }
        .lightbox-img { max-width: 85vw; max-height: 85vh; border-radius: 4px; display: block; }
        .lightbox-close { position: absolute; top: 1.5rem; right: 2rem; font-size: 2.5rem; color: white; cursor: pointer; background: none; border: none; font-family: sans-serif; line-height: 1; transition: color 0.2s; }
        .lightbox-close:hover { color: var(--secondary); }
        .lightbox-prev, .lightbox-next { position: absolute; top: 50%; transform: translateY(-50%); font-size: 3.5rem; color: white; cursor: pointer; background: none; border: none; font-family: sans-serif; padding: 0 1.2rem; transition: color 0.2s; line-height: 1; }
        .lightbox-prev { left: 0.5rem; } .lightbox-next { right: 0.5rem; }
        .lightbox-prev:hover, .lightbox-next:hover { color: var(--secondary); }
        .lb-counter { position: absolute; bottom: 1.5rem; left: 50%; transform: translateX(-50%); color: white; font-size: 0.85rem; background: rgba(0,0,0,0.5); padding: 0.3rem 0.9rem; border-radius: 20px; }
    </style>
</head>
<body>
    <header class="gallery-header">
        <a href="../" class="nav-brand">Harbour <span>Hues</span> Media</a>
        <a href="../" class="back-link">&larr; Home</a>
    </header>

    <main class="gallery-main">
        <h1>Maternity &amp; Events</h1>
        <p>Milestone moments captured beautifully. Custom packages available upon request.</p>
        <div class="gallery-grid">
            <!-- Last 3 moved to top -->
            <div class="gallery-thumb" data-index="0"><img src="../img/maternity-events/F2D4AB1E-C0C4-4294-B73E-B6FF247A4640_1_102_a%20Large.jpeg" alt="Maternity &amp; Events" loading="lazy"></div>
            <div class="gallery-thumb" data-index="1"><img src="../img/maternity-events/5B17770E-1D3D-4068-88B3-EB4E051FBA5D_1_102_a%20Large.jpeg" alt="Maternity &amp; Events" loading="lazy"></div>
            <div class="gallery-thumb" data-index="2"><img src="../img/maternity-events/6467CF24-8D4C-4E0F-AE21-F717F9414D9D_1_102_a%20Large.jpeg" alt="Maternity &amp; Events" loading="lazy"></div>
            <!-- Middle section (original pics 6-9, 11-18, pic 10 removed) -->
            <div class="gallery-thumb" data-index="3"><img src="../img/maternity-events/IMG_7929%20Large.jpeg" alt="Maternity &amp; Events" loading="lazy"></div>
            <div class="gallery-thumb" data-index="4"><img src="../img/maternity-events/IMG_7922%20Large.jpeg" alt="Maternity &amp; Events" loading="lazy"></div>
            <div class="gallery-thumb" data-index="5"><img src="../img/maternity-events/IMG_8005%20Large.jpeg" alt="Maternity &amp; Events" loading="lazy"></div>
            <div class="gallery-thumb" data-index="6"><img src="../img/maternity-events/IMG_8138%20Large.jpeg" alt="Maternity &amp; Events" loading="lazy"></div>
            <div class="gallery-thumb" data-index="7"><img src="../img/maternity-events/IMG_8249%20Large.jpeg" alt="Maternity &amp; Events" loading="lazy"></div>
            <div class="gallery-thumb" data-index="8"><img src="../img/maternity-events/IMG_8708%20Large.jpeg" alt="Maternity &amp; Events" loading="lazy"></div>
            <div class="gallery-thumb" data-index="9"><img src="../img/maternity-events/IMG_8832%20Large.jpeg" alt="Maternity &amp; Events" loading="lazy"></div>
            <div class="gallery-thumb" data-index="10"><img src="../img/maternity-events/IMG_8805%20Large.jpeg" alt="Maternity &amp; Events" loading="lazy"></div>
            <div class="gallery-thumb" data-index="11"><img src="../img/maternity-events/IMG_9002%20Large.jpeg" alt="Maternity &amp; Events" loading="lazy"></div>
            <div class="gallery-thumb" data-index="12"><img src="../img/maternity-events/IMG_8997%20Large.jpeg" alt="Maternity &amp; Events" loading="lazy"></div>

    <footer><p>&copy; 2026 Harbour Hues Media. Halifax, NS. <a href="mailto:hello@harbourhues.ca">hello@harbourhues.ca</a></p></footer>

    <div id="lightbox" class="lightbox-overlay">
        <button class="lightbox-close">&times;</button>
        <button class="lightbox-prev">&#8249;</button>
        <img id="lightbox-img" class="lightbox-img" src="" alt="" loading="lazy">
        <button class="lightbox-next">&#8250;</button>
        <div id="lb-counter" class="lb-counter"></div>
    </div>

    <script>
        const images = [
            '../img/maternity-events/F2D4AB1E-C0C4-4294-B73E-B6FF247A4640_1_102_a%20Large.jpeg',
            '../img/maternity-events/5B17770E-1D3D-4068-88B3-EB4E051FBA5D_1_102_a%20Large.jpeg',
            '../img/maternity-events/6467CF24-8D4C-4E0F-AE21-F717F9414D9D_1_102_a%20Large.jpeg',
            '../img/maternity-events/IMG_7929%20Large.jpeg','../img/maternity-events/IMG_7922%20Large.jpeg',
            '../img/maternity-events/IMG_8005%20Large.jpeg','../img/maternity-events/IMG_8138%20Large.jpeg',
            '../img/maternity-events/IMG_8249%20Large.jpeg','../img/maternity-events/IMG_8708%20Large.jpeg',
            '../img/maternity-events/IMG_8832%20Large.jpeg','../img/maternity-events/IMG_8805%20Large.jpeg',
            '../img/maternity-events/IMG_9002%20Large.jpeg','../img/maternity-events/IMG_8997%20Large.jpeg',
            '../img/maternity-events/IMG_8987%20Large.jpeg','../img/maternity-events/IMG_9047%20Large.jpeg',
            '../img/maternity-events/Untitled%202%20Large.jpeg','../img/maternity-events/IMG_6786%20Large.jpeg',
            '../img/maternity-events/IMG_6830%20Large.jpeg','../img/maternity-events/IMG_6905%20Large.jpeg',
        ];
        let currentIndex = 0;
        const lb = document.getElementById('lightbox'), lbImg = document.getElementById('lightbox-img'), lbCounter = document.getElementById('lb-counter');
        function updateLightbox() { lbImg.src = images[currentIndex]; lbCounter.textContent = `${currentIndex + 1} / ${images.length}`; }
        function openGalleryLightbox(i) { currentIndex = i; updateLightbox(); lb.classList.add('active'); document.body.style.overflow = 'hidden'; }
        function closeLightbox() { lb.classList.remove('active'); lbImg.src = ''; document.body.style.overflow = ''; }
        function prevImage(e) { if (e) e.stopPropagation(); currentIndex = (currentIndex - 1 + images.length) % images.length; updateLightbox(); }
        function nextImage(e) { if (e) e.stopPropagation(); currentIndex = (currentIndex + 1) % images.length; updateLightbox(); }
        document.querySelectorAll('.gallery-thumb').forEach(t => t.addEventListener('click', () => openGalleryLightbox(+t.dataset.index)));
        lb.addEventListener('click', e => { if (e.target === lb) closeLightbox(); });
        document.querySelector('.lightbox-close').addEventListener('click', closeLightbox);
        document.querySelector('.lightbox-prev').addEventListener('click', prevImage);
        document.querySelector('.lightbox-next').addEventListener('click', nextImage);
        document.addEventListener('keydown', e => { if (!lb.classList.contains('active')) return; if (e.key === 'Escape') closeLightbox(); if (e.key === 'ArrowLeft') prevImage(); if (e.key === 'ArrowRight') nextImage(); });
    </script>
