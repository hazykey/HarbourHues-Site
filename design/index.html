<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:type"        content="website">
    <meta property="og:url"         content="https://harbourhues.ca/design/">
    <meta property="og:title"       content="Design Gallery — Harbour Hues Media">
    <meta property="og:description" content="Bespoke brand and logo design by Ian Kehayes, Halifax NS.">
    <meta property="og:image"       content="https://harbourhues.ca/img/nature%20and%20landscapes/8D531ECE-AADE-4583-8AED-E96567D45D4C_1_105_c%20Large.jpeg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta name="twitter:card"       content="summary_large_image">
    <meta name="twitter:title"      content="Design Gallery — Harbour Hues Media">
    <meta name="twitter:description" content="Bespoke brand and logo design by Ian Kehayes, Halifax NS.">
    <meta name="twitter:image"      content="https://harbourhues.ca/img/nature%20and%20landscapes/8D531ECE-AADE-4583-8AED-E96567D45D4C_1_105_c%20Large.jpeg">
    <meta name="description" content="Design gallery by Harbour Hues Media, Halifax NS. Bespoke designs for your upcoming brand or business.">
    <title>Design Gallery - Harbour Hues Media</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a4567;
            --secondary: #f4a261;
            --accent: #e76f51;
            --bg: #f8f9fa;
            --text: #2c3e50;
            --white: #ffffff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }

        .gallery-header {
            position: sticky; top: 0;
            background: rgba(255,255,255,0.97); backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(26,69,103,0.08);
            padding: 0 2rem; height: 70px;
            display: flex; align-items: center; justify-content: space-between;
            z-index: 100;
        }
        .nav-brand {
            font-family: 'Playfair Display', serif; font-size: 1.2rem;
            color: var(--primary); text-decoration: none; letter-spacing: 0.04em;
        }
        .nav-brand span { color: var(--secondary); font-style: italic; }
        .back-link {
            color: var(--primary); text-decoration: none; font-size: 0.82rem;
            font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; transition: color 0.2s;
        }
        .back-link:hover { color: var(--secondary); }

        .gallery-main { padding: 3rem 2rem 2rem; text-align: center; }
        .gallery-main h1 {
            font-size: 2.6rem; color: var(--primary);
            border-bottom: 2px solid var(--secondary);
            display: inline-block; padding-bottom: 0.5rem; margin-bottom: 0.6rem;
        }
        .gallery-main > p { color: #6b7c8d; margin-bottom: 2rem; font-size: 1rem; font-style: italic; }

        /* Larger tiles for design - it's a smaller collection */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1rem;
            max-width: 1200px; margin: 0 auto;
        }
        .gallery-thumb {
            overflow: hidden; border-radius: 12px; aspect-ratio: 1;
            background: #e8edf2; cursor: zoom-in;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .gallery-thumb:hover { transform: translateY(-4px); box-shadow: 0 12px 30px rgba(0,0,0,0.15); }
        .gallery-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.3s; }
        .gallery-thumb:hover img { transform: scale(1.04); }

        .back-btn-wrap { text-align: center; padding: 3rem 2rem 2rem; }
        .btn-home {
            display: inline-block; padding: 0.9rem 2.5rem;
            background: var(--primary); color: white; text-decoration: none;
            border-radius: 50px; font-weight: 600; font-size: 0.9rem;
            letter-spacing: 0.05em; transition: background 0.3s, transform 0.2s;
        }
        .btn-home:hover { background: var(--accent); transform: translateY(-2px); }

        footer { background: var(--primary); color: white; padding: 2rem; text-align: center; font-size: 0.9rem; }
        footer a { color: var(--secondary); }

        .lightbox-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.93); z-index: 9999;
            align-items: center; justify-content: center;
        }
        .lightbox-overlay.active { display: flex; }
        .lightbox-img { max-width: 85vw; max-height: 85vh; border-radius: 4px; display: block; }
        .lightbox-close {
            position: absolute; top: 1.5rem; right: 2rem;
            font-size: 2.5rem; color: white; cursor: pointer;
            background: none; border: none; font-family: sans-serif; line-height: 1; transition: color 0.2s;
        }
        .lightbox-close:hover { color: var(--secondary); }
        .lightbox-prev, .lightbox-next {
            position: absolute; top: 50%; transform: translateY(-50%);
            font-size: 3.5rem; color: white; cursor: pointer;
            background: none; border: none; font-family: sans-serif;
            padding: 0 1.2rem; transition: color 0.2s; line-height: 1;
        }
        .lightbox-prev { left: 0.5rem; }
        .lightbox-next { right: 0.5rem; }
        .lightbox-prev:hover, .lightbox-next:hover { color: var(--secondary); }
        .lb-counter {
            position: absolute; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
            color: white; font-size: 0.85rem; font-family: 'Inter', sans-serif;
            background: rgba(0,0,0,0.5); padding: 0.3rem 0.9rem; border-radius: 20px;
        }

    </style>
</head>
<body>

    <header class="gallery-header">
        <a href="../" class="nav-brand">Harbour <span>Hues</span> Media</a>
        <a href="../" class="back-link">&larr; Home</a>
    </header>

    <main class="gallery-main">
        <h1>Design</h1>
        <p>Bespoke designs for your upcoming brand or business.</p>

        <div class="gallery-grid">
            <div class="gallery-thumb" data-index="0"><img src="../img/design/Red%20Gem%20Large.jpeg" alt="Design work" loading="lazy"></div>
            <div class="gallery-thumb" data-index="1"><img src="../img/design/Ecstacy%20logo%20image%20Large.jpeg" alt="Design work" loading="lazy"></div>
            <div class="gallery-thumb" data-index="2"><img src="../img/design/Aurora_logo_colour%20Sign%2025x36%20Large.jpeg" alt="Design work" loading="lazy"></div>
            <div class="gallery-thumb" data-index="3"><img src="../img/design/6BF6CE44-43C6-4FB9-B802-F1D74440CC37_1_105_c%20Large.jpeg" alt="Design work" loading="lazy"></div>
            <div class="gallery-thumb" data-index="4"><img src="../img/design/IMG_6578%20Large.jpeg" alt="Design work" loading="lazy"></div>
        </div>
    </main>

    <div class="back-btn-wrap">
        <a href="../" class="btn-home">&larr; Back to Home</a>
    </div>

    <footer>
        <p>&copy; 2026 Harbour Hues Media. Halifax, NS. <a href="mailto:hello@harbourhues.ca">hello@harbourhues.ca</a></p>
    </footer>

    <div id="lightbox" class="lightbox-overlay">
        <button class="lightbox-close">&times;</button>
        <button class="lightbox-prev">&#8249;</button>
        <img id="lightbox-img" class="lightbox-img" src="" alt="" loading="lazy">
        <button class="lightbox-next">&#8250;</button>
        <div id="lb-counter" class="lb-counter"></div>
    </div>

    <script>
        const images = [
            '../img/design/Red%20Gem%20Large.jpeg',
            '../img/design/Ecstacy%20logo%20image%20Large.jpeg',
            '../img/design/Aurora_logo_colour%20Sign%2025x36%20Large.jpeg',
            '../img/design/6BF6CE44-43C6-4FB9-B802-F1D74440CC37_1_105_c%20Large.jpeg',
            '../img/design/IMG_6578%20Large.jpeg',
        ];
        let currentIndex = 0;
        const lb = document.getElementById('lightbox');
        const lbImg = document.getElementById('lightbox-img');
        const lbCounter = document.getElementById('lb-counter');

        function updateLightbox() {
            lbImg.src = images[currentIndex];
            lbCounter.textContent = `${currentIndex + 1} / ${images.length}`;
        }
        function openGalleryLightbox(index) {
            currentIndex = index;
            updateLightbox();
            lb.classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        function closeLightbox() {
            lb.classList.remove('active');
            lbImg.src = '';
            document.body.style.overflow = '';
        }
        function prevImage(e) {
            if (e) e.stopPropagation();
            currentIndex = (currentIndex - 1 + images.length) % images.length;
            updateLightbox();
        }
        function nextImage(e) {
            if (e) e.stopPropagation();
            currentIndex = (currentIndex + 1) % images.length;
            updateLightbox();
        }

        document.querySelectorAll('.gallery-thumb').forEach(thumb => {
            thumb.addEventListener('click', () => openGalleryLightbox(parseInt(thumb.dataset.index)));
        });

        lb.addEventListener('click', e => { if (e.target === lb) closeLightbox(); });
        document.querySelector('.lightbox-close').addEventListener('click', closeLightbox);
        document.querySelector('.lightbox-prev').addEventListener('click', prevImage);
        document.querySelector('.lightbox-next').addEventListener('click', nextImage);

        document.addEventListener('keydown', e => {
            if (!lb.classList.contains('active')) return;
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowLeft') prevImage();
            if (e.key === 'ArrowRight') nextImage();
        });
    </script>
</body>
</html>
